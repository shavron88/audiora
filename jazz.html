<!-- jazz.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUDIORA - Jazz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="logo">
      <img src="audiora-logo.png" alt="AUDIORA Logo" />
      <span>AUDIORA</span>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="playlist.html">Playlist</a>
      
     <a href="classic.html"
      <a href="pop.html">Pop</a>
      <a href="jazz.html" class="active">Jazz</a>
    </nav>
  </header>

  <main>
    <h1>Jazz Vibes</h1>
    <div class="music-list">
      <div class="music-card">
        <img src="images/jazz1.jpg" alt="Track" />
        <h2>So What</h2>
        <p>Miles Davis</p>
        <button onclick="playTrack('So What', 'Miles Davis')">▶ Play</button>
      </div>
      <div class="music-card">
        <img src="images/jazz2.jpg" alt="Track" />
        <h2>Take Five</h2>
        <p>Dave Brubeck</p>
        <button onclick="playTrack('Take Five', 'Dave Brubeck')">▶ Play</button>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 AUDIORA. All rights reserved.</p>
  </footer>

  <script>
    function playTrack(title, artist) {
      alert(`Playing: ${title} by ${artist}`);
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      let recent = JSON.parse(localStorage.getItem('recentTracks')) || [];
      recent.unshift({ title, artist, time });
      if (recent.length > 10) recent.pop();
      localStorage.setItem('recentTracks', JSON.stringify(recent));
    }
  </script>
</body>
</html>
