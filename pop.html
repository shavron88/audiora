<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AUDIORA - Pop Music</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">
      <img src="audiora-logo.png" alt="AUDIORA Logo" />
      <span>AUDIORA</span>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="playlist.html">Playlist</a>
          <a href="pop.html" class="active">Pop</a>
     <a href="jazz.html">jazz</a>
      <a href="classic.html">classic</a>
    </nav>
  </header>

  <main>
    <h1>Pop Music Hits</h1>
    <div class="music-list">
      <div class="music-card">
        <img src="images/pop1.jpg" alt="Track 1" />
        <h2>Blinding Lights</h2>
        <p>The Weeknd</p>
        <button onclick="playTrack('Blinding Lights', 'The Weeknd')">▶ Play</button>
      </div>
      <div class="music-card">
        <img src="images/pop2.jpg" alt="Track 2" />
        <h2>Levitating</h2>
        <p>Dua Lipa</p>
        <button onclick="playTrack('Levitating', 'Dua Lipa')">▶ Play</button>
      </div>
      <div class="music-card">
        <img src="images/pop3.jpg" alt="Track 3" />
        <h2>As It Was</h2>
        <p>Harry Styles</p>
        <button onclick="playTrack('As It Was', 'Harry Styles')">▶ Play</button>
      </div>
      <!-- Add more cards as needed -->
    </div>
  </main>

  <footer>
    <p>&copy; 2025 AUDIORA. All rights reserved.</p>
  </footer>

  <script>
    function playTrack(title, artist) {
      alert(`Playing: ${title} by ${artist}`);

      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      let recent = JSON.parse(localStorage.getItem('recentTracks')) || [];
      recent.unshift({ title, artist, time });
      if (recent.length > 10) recent.pop();
      localStorage.setItem('recentTracks', JSON.stringify(recent));
    }
  </script>
</body>
</html>
